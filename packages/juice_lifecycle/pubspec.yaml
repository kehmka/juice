name: juice_lifecycle
description: App lifecycle (foreground/background/resume) as a Juice bloc, behind a swappable provider seam.
version: 0.1.0

repository: https://github.com/kehmka/juice/tree/main/packages/juice_lifecycle
issue_tracker: https://github.com/kehmka/juice/issues
homepage: https://kehmka.github.io/juice/
documentation: https://kehmka.github.io/juice/
topics: [lifecycle, bloc, state-management, app-state, foreground]
funding: [https://github.com/sponsors/kehmka]

environment:
  sdk: ^3.5.4
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  juice: ^1.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
