name: juice_i18n
description: Reactive locale selection and translation lookup as a Juice bloc, behind swappable source and persistence seams.
version: 0.1.0

repository: https://github.com/kehmka/juice/tree/main/packages/juice_i18n
issue_tracker: https://github.com/kehmka/juice/issues
homepage: https://kehmka.github.io/juice/
documentation: https://kehmka.github.io/juice/
topics: [i18n, l10n, localization, bloc, state-management]
funding:
  - https://github.com/sponsors/kehmka

environment:
  sdk: ^3.5.4
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  juice: ^1.4.0
  juice_storage: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
