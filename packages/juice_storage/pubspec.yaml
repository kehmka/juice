name: juice_storage
description: Local storage, caching, and secure storage for the Juice framework. Supports Hive CE, SharedPreferences, SQLite, and flutter_secure_storage.
version: 2.0.0

homepage: https://kehmka.github.io/juice/
repository: https://github.com/kehmka/juice/tree/main/packages/juice_storage
issue_tracker: https://github.com/kehmka/juice/issues
topics: [storage, cache, hive, sqlite, bloc]
funding: [https://github.com/sponsors/kehmka]

environment:
  sdk: '>=3.5.4 <4.0.0'
  flutter: '>=3.24.0'

dependencies:
  flutter:
    sdk: flutter
  juice: ^1.4.0
  # Hive CE — the maintained community continuation of (abandoned) Hive v2.
  # Drop-in: same v2 box/adapter API. See CHANGELOG 2.0.0.
  hive_ce: ^2.19.3
  hive_ce_flutter: ^2.3.4
  shared_preferences: ^2.3.0
  sqflite: ^2.3.0
  path: ^1.9.0
  flutter_secure_storage: ^9.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  mocktail: ^1.0.4
  sqflite_common_ffi: ^2.3.0+1

flutter:
  uses-material-design: true
