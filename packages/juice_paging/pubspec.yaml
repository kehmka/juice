  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  juice: ^1.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
