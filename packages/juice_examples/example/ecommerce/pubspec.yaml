name: ecommerce
description: E-commerce product browser showcasing all Juice packages working together.
publish_to: 'none'

environment:
  sdk: ^3.5.4
  flutter: '>=3.24.0'

dependencies:
  flutter:
    sdk: flutter
  juice:
    path: ../../../juice
  juice_storage:
    path: ../../../juice_storage
  juice_network:
    path: ../../../juice_network
  juice_routing:
    path: ../../../juice_routing

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

dependency_overrides:
  juice:
    path: ../../../juice
  juice_storage:
    path: ../../../juice_storage
  juice_network:
    path: ../../../juice_network
  juice_routing:
    path: ../../../juice_routing

flutter:
  uses-material-design: true
