name: juice_sync
description: Offline outbox / mutation queue with durable persistence, ordering, retries and dead-lettering, as a Juice bloc.
version: 0.1.1

repository: https://github.com/kehmka/juice/tree/main/packages/juice_sync
issue_tracker: https://github.com/kehmka/juice/issues
homepage: https://kehmka.github.io/juice/
documentation: https://kehmka.github.io/juice/
topics: [offline, outbox, sync, bloc, state-management]
funding:
  - https://github.com/sponsors/kehmka

environment:
  sdk: ^3.5.4
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  juice: ^1.4.0
  juice_storage: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  # For the StorageSyncStore-over-real-Hive regression test.
  hive: ^2.2.3
  shared_preferences: ^2.2.0

flutter:
  uses-material-design: true
