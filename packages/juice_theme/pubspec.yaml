name: juice_theme
description: App theme selection (mode + flavor) as a Juice bloc, with optional persistence behind a swappable seam.
version: 0.1.0

repository: https://github.com/kehmka/juice/tree/main/packages/juice_theme
issue_tracker: https://github.com/kehmka/juice/issues
homepage: https://kehmka.github.io/juice/
documentation: https://kehmka.github.io/juice/
topics: [theme, dark-mode, bloc, state-management, appearance]
funding:
  - https://github.com/sponsors/kehmka

environment:
  sdk: ^3.5.4
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  juice: ^1.4.0
  juice_storage: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
