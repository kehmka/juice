name: juice_paging
description: Paged / infinite-scroll list state as a generic Juice bloc, behind a cursor-based fetcher seam.
version: 0.1.0

repository: https://github.com/kehmka/juice/tree/main/packages/juice_paging
issue_tracker: https://github.com/kehmka/juice/issues
homepage: https://kehmka.github.io/juice/
documentation: https://kehmka.github.io/juice/
topics: [pagination, infinite-scroll, list, bloc, state-management]
funding:
  - https://github.com/sponsors/kehmka

environment:
