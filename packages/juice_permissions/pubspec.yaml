name: juice_permissions
description: Runtime permission grant-state as a Juice bloc — request, check, and react to permissions behind a swappable provider seam.
version: 0.1.0

repository: https://github.com/kehmka/juice/tree/main/packages/juice_permissions
issue_tracker: https://github.com/kehmka/juice/issues
homepage: https://kehmka.github.io/juice/
documentation: https://kehmka.github.io/juice/
topics: [permissions, bloc, state-management, platform, runtime-permissions]
funding: [https://github.com/sponsors/kehmka]

environment:
  sdk: ^3.5.4
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  juice: ^1.4.0
  permission_handler: ^11.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
