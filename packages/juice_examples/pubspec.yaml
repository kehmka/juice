name: juice_examples
description: Production-quality example apps showcasing the Juice state management ecosystem.
version: 0.1.0
homepage: https://kehmka.github.io/juice/
repository: https://github.com/kehmka/juice/tree/main/packages/juice_examples
issue_tracker: https://github.com/kehmka/juice/issues
topics: [bloc, state-management, examples, clean-architecture]
funding: [https://github.com/sponsors/kehmka]

environment:
  sdk: ^3.5.4
  flutter: '>=3.24.0'

dependencies:
  flutter:
    sdk: flutter
  juice:
    path: ../juice
  juice_storage:
    path: ../juice_storage
  juice_network:
    path: ../juice_network
  juice_routing:
    path: ../juice_routing
  juice_auth:
    path: ../juice_auth

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

dependency_overrides:
  juice:
    path: ../juice
  juice_storage:
    path: ../juice_storage
  juice_network:
    path: ../juice_network
  juice_routing:
    path: ../juice_routing
  juice_auth:
    path: ../juice_auth

flutter:
  uses-material-design: true
